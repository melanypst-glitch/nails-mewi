<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow Nails Agenda ✨ Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Courier+Prime&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-mewi: #ffb7c5;
            --rosa-fuerte: #ff85a1;
            --fondo: #fff5f7;
            --texto: #5d4d50;
        }

        /* CONFIGURACIÓN PARA QUE NO SE PASE DE UNA HOJA */
        @page { size: auto; margin: 0mm; }

        body { background: var(--fondo); font-family: 'Montserrat', sans-serif; color: var(--texto); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .contenedor-app { max-width: 450px; width: 100%; }

        .header-app { text-align: center; margin-bottom: 12px; }
        .logo-peque { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--rosa-mewi); object-fit: cover; }
        
        .slogan-inicio { font-family: 'Dancing Script', cursive; color: var(--rosa-fuerte); font-size: 24px; margin-top: 8px; font-weight: bold; }

        .formulario-mellow { 
            background: white; padding: 25px; border-radius: 30px; 
            box-shadow: 0 8px 25px rgba(255, 183, 197, 0.2); margin-top: 15px; margin-bottom: 25px;
            border: 1px solid var(--rosa-mewi);
        }
        
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 15px; 
            border: 1.5px solid var(--rosa-mewi); outline: none; box-sizing: border-box; font-size: 16px;
        }

        .btn-guardar { 
            width: 100%; padding: 16px; background: var(--rosa-fuerte); color: white; 
            border: none; border-radius: 50px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 15px;
        }

        .card { background: white; border-radius: 20px; padding: 18px; border-left: 8px solid var(--rosa-mewi); margin-bottom: 12px; }
        .btn-ticket { background: var(--fondo); color: var(--rosa-fuerte); border: 2px dashed var(--rosa-fuerte); padding: 12px; border-radius: 15px; font-size: 13px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }

        /* --- TICKET AJUSTADO PARA UNA SOLA HOJA --- */
        #ticket-imprimir { 
            display: none; 
            width: 120mm; 
            background: #fff0f3; 
            color: #333; 
            padding: 40px; 
            border: 5px solid #ffb7c5;
            border-radius: 35px;
            box-sizing: border-box;
        }
        
        @media print {
            body * { visibility: hidden; }
            #ticket-imprimir, #ticket-imprimir * { visibility: visible; }
            #ticket-imprimir { 
                display: block !important; 
                position: absolute; left: 50%; top: 10mm; 
                transform: translateX(-50%);
                text-align: center;
                page-break-inside: avoid;
            }
            .t-header { font-family: 'Dancing Script', cursive; font-size: 55px; color: #ff85a1; margin-bottom: 5px; }
            .t-slogan { font-family: 'Dancing Script', cursive; font-size: 24px; color: #ff85a1; margin-bottom: 20px; display: block; }
            .t-sub { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; display: block; font-weight: bold; }
            
            .t-datos { 
                font-family: 'Courier Prime', monospace; 
                text-align: left; 
                font-size: 20px; 
                background: white; 
                padding: 30px; 
                border-radius: 20px;
                border: 3px solid #ffdae0;
                line-height: 1.8;
            }

            .t-footer-container { 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                margin-top: 30px; 
                gap: 25px;
            }
            
            .t-imagen-final { width: 110px; height: 110px; border-radius: 20px; object-fit: cover; border: 3px solid #ffb7c5; }
            .t-gracias { font-family: 'Dancing Script', cursive; font-size: 30px; color: #ff85a1; text-align: left; line-height: 1.1; }
            .separador-corazon { color: #ffb7c5; margin: 20px 0; font-size: 25px; }
        }
    </style>
</head>
<body>

<div class="contenedor-app">
    <div class="header-app">
        <img src="https://i.postimg.cc/ydGG5dyZ/c43685be68bf2cc765f86021f2733fb2-(1).jpg" class="logo-peque">
        <h1 style="font-size: 26px; color: var(--rosa-fuerte); margin: 8px 0 0 0;">Mellow Nails</h1>
        <div class="slogan-inicio">Uñitas tiernas para manos que brillan ✨💖</div>
    </div>

    <div class="formulario-mellow">
        <input type="text" id="nombre" placeholder="Nombre de la clienta">
        <input type="text" id="ubicacion" placeholder="📍 Ubicación">
        <input type="datetime-local" id="fechaCita">
        <select id="sistema">
            <option value="Acrílico Escuplido">Acrílico Escuplido 💅</option>
            <option value="Soft Gel">Soft Gel ✨</option>
            <option value="Polygel">Polygel 🌸</option>
            <option value="Semipermanente">Semipermanente 🎀</option>
            <option value="Kapping">Kapping / Base Rubber 💎</option>
        </select>
        <button class="btn-guardar" onclick="guardarCita()">💖 Agendar Cita</button>
    </div>

    <div class="lista-cards" id="listaCitas"></div>
</div>

<div id="ticket-imprimir">
    <div class="t-header">Mellow Nails</div>
    <div class="t-slogan">"Uñitas tiernas para manos que brillan" ✨💖</div>
    <span class="t-sub">Comprobante de Cita</span>
    
    <div class="separador-corazon">🌸 • 🎀 • 🌸</div>

    <div class="t-datos">
        <p><b>CLIENTA:</b> <span id="t-nombre"></span></p>
        <p><b>FECHA:</b> <span id="t-fecha"></span></p>
        <p><b>HORA:</b> <span id="t-hora"></span></p>
        <p><b>SISTEMA:</b> <span id="t-sistema"></span></p>
        <p><b>LUGAR:</b> <span id="t-lugar"></span></p>
    </div>

    <div class="t-footer-container">
        <img src="https://i.postimg.cc/ydGG5dyZ/c43685be68bf2cc765f86021f2733fb2-(1).jpg" class="t-imagen-final">
        <div class="t-gracias">
            Gracias por<br>preferirnos,<br>¡te esperamos!
        </div>
    </div>
    <p style="font-size: 13px; margin-top: 25px; opacity: 0.6;">Mellow Nails Studio 🐭💅</p>
</div>

<script>
    let citas = JSON.parse(localStorage.getItem('mellow_nails_agenda')) || [];

    function guardarCita() {
        const nombre = document.getElementById('nombre').value;
        const fechaCita = document.getElementById('fechaCita').value;
        const sistema = document.getElementById('sistema').value;
        const ubicacion = document.getElementById('ubicacion').value || "Nuestro Studio 🎀";

        if (!nombre || !fechaCita) return alert("¡Mel! No olvides el nombre o la fecha 🐭");

        citas.push({ id: Date.now(), nombre, fechaCita, sistema, ubicacion });
        citas.sort((a, b) => new Date(a.fechaCita) - new Date(b.fechaCita));
        localStorage.setItem('mellow_nails_agenda', JSON.stringify(citas));
        renderizar();
        alert("¡Cita agendada! 🌸✨");
    }

    function imprimirTicket(id) {
        const c = citas.find(cita => cita.id === id);
        
        // PREGUNTA LA FECHA ANTES DE IMPRIMIR
        const nuevaFechaFull = prompt("¿Confirmas la fecha y hora para el ticket?", c.fechaCita);
        
        if (nuevaFechaFull) {
            const f = new Date(nuevaFechaFull);
            document.getElementById('t-nombre').innerText = c.nombre.toUpperCase();
            document.getElementById('t-fecha').innerText = f.toLocaleDateString();
            document.getElementById('t-hora').innerText = f.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('t-sistema').innerText = c.sistema;
            document.getElementById('t-lugar').innerText = c.ubicacion;

            setTimeout(() => { window.print(); }, 300);
        }
    }

    function renderizar() {
        const lista = document.getElementById('listaCitas');
        lista.innerHTML = "";
        citas.forEach(c => {
            const f = new Date(c.fechaCita);
            lista.innerHTML += `
                <div class="card">
                    <p style="font-size:12px; color:var(--rosa-fuerte); font-weight:bold;">📅 ${f.toLocaleString()}</p>
                    <h3 style="margin:5px 0; font-size:18px;">${c.nombre}</h3>
                    <button class="btn-ticket" onclick="imprimirTicket(${c.id})">📄 GENERAR TICKET ÚNICO</button>
                    <button style="color:#ffadad; border:none; background:none; font-size:12px; cursor:pointer; margin-top:10px;" onclick="borrar(${c.id})">Borrar</button>
                </div>
            `;
        });
    }

    function borrar(id) {
        if(confirm("¿Borrar esta cita? 🐭")) {
            citas = citas.filter(c => c.id !== id);
            localStorage.setItem('mellow_nails_agenda', JSON.stringify(citas));
            renderizar();
        }
    }

    renderizar();
</script>

</body>
</html>
